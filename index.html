<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alpha Master | Premium Loot Hub</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Poppins:ital,wght@1,900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="mobile.css">
    <link rel="stylesheet" href="desktop.css">
</head>
<body>

    <div class="glow-engine">
        <div class="blob p-blob"></div>
        <div class="blob c-blob"></div>
        <div class="mesh-overlay"></div>
    </div>

    <div class="app-container">
        <header class="main-header glass">
            <div class="brand" id="admin-trigger-1">
                <img src="alphacampaignslogo.png" alt="Logo" class="logo">
                <h1 class="theme-font" id="admin-trigger-2">ALPHA<span>.</span></h1>
            </div>
            <div class="search-bar glass">
                <input type="text" id="mainSearch" placeholder="Find loots..." onkeyup="filterLoot()">
                <span>🔍</span>
            </div>
        </header>

        <nav class="cat-bar glass" id="catBar">
            <button class="nav-btn active" onclick="switchTab('upi')">UPI</button>
            <button class="nav-btn" onclick="switchTab('finance')">BANK</button>
            <button class="nav-btn" onclick="switchTab('smm')">SMM</button>
            <button class="nav-btn" onclick="switchTab('refer')">REFER</button>
            <button class="nav-btn" onclick="switchTab('gaming')">PLAY</button>
            <button class="nav-btn" onclick="switchTab('special')">MORE</button>
        </nav>

        <main>
            <div id="lootGrid" class="bento-grid">
                <!-- Data from Supabase -->
            </div>
        </main>
    </div>

    <!-- Modal Sheets -->
    <div id="taskModal" class="overlay modal-overlay" onclick="closeModals(event)">
        <div class="modal-sheet glass">
            <div class="handle"></div>
            <div id="modalContent"></div>
        </div>
    </div>

    <div id="videoModal" class="overlay" onclick="closeModals(event)">
        <div class="modal-sheet glass" style="max-width:800px; margin:auto;">
            <video id="player" controls playsinline style="width:100%; border-radius:15px;"></video>
            <button class="btn-primary" style="margin-top:15px;" onclick="closeVideo()">CLOSE</button>
        </div>
    </div>

    <!-- Admin Panel -->
    <div id="adminPortal" class="overlay admin-overlay">
        <div class="admin-panel glass">
            <h2 class="theme-font">COMMAND CENTER</h2>
            <div class="admin-form">
                <input type="text" id="taskTitle" placeholder="Title">
                <input type="number" id="taskReward" placeholder="Reward">
                <select id="taskCat">
                    <option value="upi">UPI</option>
                    <option value="finance">Finance</option>
                    <option value="smm">SMM</option>
                    <option value="refer">Refer</option>
                    <option value="gaming">Gaming</option>
                    <option value="special">Special</option>
                </select>
                <input type="text" id="taskLink" placeholder="Link">
                <input type="text" id="taskVideo" placeholder="Video (e.g. airtel.mp4)">
                <textarea id="taskSteps" placeholder="Instructions (Enter per line)"></textarea>
                <button class="btn-primary" onclick="saveTask()">PUSH TO CLOUD</button>
                <button class="btn-primary" style="background:none; color:#fff;" onclick="closeAdmin()">CANCEL</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast">Success!</div>

    <script src="logic.js"></script>
</body>
</html>
