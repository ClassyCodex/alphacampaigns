        <!-- Stats Section -->
        <div class="category-info-panel">
            <div class="title-group">
                <h2 id="page-display-title">UPI Loot</h2>
                <p id="page-subtitle">Small loots, big savings</p>
            </div>
            <div class="stat-card glass">
                <span>Available</span>
                <h3 id="category-earnings-display">₹0.00</h3>
            </div>
        </div>

        <!-- Search Bar -->
        <div class="search-container glass">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input type="text" id="offerSearch" placeholder="Search for offers..." onkeyup="filterBySearch()">
        </div>

        <!-- Offer List -->
        <main id="offer-list" class="offer-container"></main>
    </div>

    <!-- Instruction Modal -->
    <div id="modal-overlay" class="modal-overlay" onclick="closeOutside(event)">
        <div class="modal-content glass">
            <div class="modal-handle"></div>
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <div id="modal-content-body"></div>
        </div>
    </div>

    <!-- Video Player Modal -->
    <div id="video-overlay" class="video-overlay" onclick="closeVideoOutside(event)">
        <div class="video-window glass">
            <button class="video-close" onclick="closeVideo()">&times;</button>
            <video id="tutorial-video" controls playsinline></video>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-navbar glass">
        <div class="nav-btn active" onclick="switchSection('upi', this)"><p>UPI</p></div>
        <div class="nav-btn" onclick="switchSection('bank', this)"><p>Bank</p></div>
        <div class="nav-btn" onclick="switchSection('crypto', this)"><p>Crypto</p></div>
        <div class="nav-btn premium-nav" onclick="switchSection('special', this)"><p>Special</p></div>
    </nav>

    <!-- Toast Notification -->
    <div id="toast" class="toast glass">Copied to Clipboard!</div>

    <script src="data.js"></script>
    <script src="app.js"></script>
